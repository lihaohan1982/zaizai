name: location_chat_app
version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.4.9

  # Network
  dio: ^5.4.0
  web_socket_channel: ^2.4.0

  # Monitoring / Observability
  sentry_flutter: ^8.14.0

  cupertino_icons: ^1.0.8

  # Location (cross-platform)
  geolocator: ^10.1.0
  battery_plus: ^5.0.0
  url_launcher: ^6.2.5

  # Local storage
  hive: ^2.2.0
  hive_flutter: ^1.1.0

  # Environment variables
  flutter_dotenv: ^5.2.1
  meta: ^1.16.0

  # Screen adaptation
  flutter_screenutil: ^5.9.0

  # Maps (OpenStreetMap via flutter_map)
  flutter_map: ^6.1.0
  latlong2: ^0.9.1
  encrypt: ^5.0.3
  flutter_secure_storage: ^10.3.1

  # Background / Foreground Service
  flutter_foreground_task: ^8.10.1
  workmanager: ^0.5.2

  # UI utilities
  qr_flutter: ^4.1.0
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  mockito: ^5.6.4
  build_runner: ^2.15.0

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/mock_friends.json
    - assets/mock_fences.json
