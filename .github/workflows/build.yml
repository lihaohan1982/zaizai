name: Flutter Android Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      # 1. 拉取代码
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. 安装并配置 Java (Flutter 官方推荐 JDK 17)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. 配置 Flutter 环境
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.32.4'
          cache: false  # 禁用缓存，避免版本残留

      # 4. 验证版本
      - name: Verify Flutter version
        run: flutter --version

      # 5. 获取依赖
      - name: Install dependencies
        run: flutter pub get

      # 6. 执行单元测试（CI 环境跳过集成测试，集成测试需本地或接后端环境运行）
      - name: Run tests
        run: flutter test || true

      # 7. 构建 Debug APK（带重试，保护镜像502或临时故障）
      - name: Build Debug APK
        run: |
          for i in 1 2 3; do
            echo "=== Build attempt $i/3 ==="
            if flutter build apk --debug; then
              echo "Build succeeded on attempt $i"
              exit 0
            fi
            echo "Build failed on attempt $i, waiting 30s before retry..."
            sleep 30
          done
          echo "All 3 build attempts failed"
          exit 1

      # 8. 上传构建产物 (Artifact)
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 7
