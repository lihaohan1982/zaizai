name: Flutter Android Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      # 1. 拉取代码
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. 安装并配置 Java (Flutter 官方推荐 JDK 17)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. 配置 Flutter 环境（⚠️ beta 通道包含 Dart 3.8.x）
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'beta'
          cache: true

      # 4. 验证版本
      - name: Verify Flutter version
        run: flutter --version

      # 5. 获取依赖
      - name: Install dependencies
        run: flutter pub get

      # 6. 执行单元测试
      - name: Run tests
        run: flutter test

      # 7. 构建 Debug APK
      - name: Build Debug APK
        run: flutter build apk --debug

      # 8. 上传构建产物 (Artifact)
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 7
